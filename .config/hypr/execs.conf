env = MOZ_ENABLE_WAYLAND, 1

# Wallpaper
exec-once = swww kill; swww init

# Status bar
exec-once = ags &

# Input method
exec-once = fcitx5

# Core components (authentication, lock screen, notification daemon)
exec-once = gnome-keyring-daemon --start --components=secrets &
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
#exec-once = swayidle -w timeout 300 'swaylock -f' before-sleep 'swaylock -f' &
# exec-once = swayidle -w timeout 450 'pidof java || systemctl suspend' &
# `systemctl suspend' seems to cause system freeze on my PC, so I'm disabling it here.
# `pidof java' to prevent sleep if playing minecraft, else nvidia will fuck up
exec-once = dbus-update-activation-environment --all &
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Some fix idk

exec-once = systemctl --user import-environment
exec = hyprshade auto

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# disable middle-click paste
exec-once = wl-paste -p --watch wl-copy -p ""

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

